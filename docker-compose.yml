services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: researchos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: researchos
      POSTGRES_PASSWORD: researchos
      POSTGRES_DB: researchos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchos -d researchos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: researchos_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://researchos:researchos@postgres:5432/researchos_db"
    ports:
      - "8088:8000"
    volumes:
      - ./backend:/app          # Hot-reload in development
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_store
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info

volumes:
  postgres_data:
  uploads_data:
  chroma_data:
